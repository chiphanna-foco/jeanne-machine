<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="gearGrad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4c63d2"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="brainGrad" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Gear -->
  <g transform="translate(50 50)">
    <path fill="url(#gearGrad)" stroke="#f59e0b" stroke-width="1.2" d="M-6-42 L6-42 L8-34 L14-32 L20-36 L28-28 L24-22 L26-16 L34-14 L36-2 L34 10 L26 12 L24 18 L28 24 L20 32 L14 28 L8 30 L6 38 L-6 38 L-8 30 L-14 28 L-20 32 L-28 24 L-24 18 L-26 12 L-34 10 L-36-2 L-34-14 L-26-16 L-24-22 L-28-28 L-20-36 L-14-32 L-8-34 Z"/>
    <circle r="28" fill="#0f172a"/>
    <circle r="28" fill="none" stroke="#f59e0b" stroke-width="1"/>
  </g>

  <!-- Brain -->
  <g transform="translate(50 46)" filter="url(#glow)">
    <path fill="url(#brainGrad)" opacity="0.95" d="M-14-10 C-18-6 -18 0 -14 4 C-16 8 -12 12 -8 12 C-6 14 -2 14 0 12 C2 14 6 14 8 12 C12 12 16 8 14 4 C18 0 18-6 14-10 C14-14 8-16 4-14 C2-16 -2-16 -4-14 C-8-16 -14-14 -14-10 Z"/>
    <path stroke="#0f172a" stroke-width="0.8" fill="none" stroke-linecap="round" d="M-8-8 Q-4-4 -6 0 M0-10 L0 10 M6-8 Q10-4 8 0 M-6 4 Q-2 6 0 4 M0 4 Q2 6 6 4"/>
  </g>

  <!-- Scales -->
  <g transform="translate(62 64)">
    <line x1="0" y1="-4" x2="0" y2="14" stroke="#f59e0b" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-10" y1="-4" x2="10" y2="-4" stroke="#f59e0b" stroke-width="1.4" stroke-linecap="round"/>
    <path fill="#f59e0b" stroke="#0f172a" stroke-width="0.4" d="M-14-4 L-6-4 L-10 4 Z"/>
    <path fill="#f59e0b" stroke="#0f172a" stroke-width="0.4" d="M6-4 L14-4 L10 4 Z"/>
    <circle cy="14" r="2" fill="#f59e0b"/>
  </g>

  <!-- Gavel -->
  <g transform="translate(36 66) rotate(-30)">
    <rect x="-3" y="-2" width="12" height="6" rx="1" fill="#7c3aed" stroke="#0f172a" stroke-width="0.4"/>
    <rect x="-8" y="2" width="5" height="3" fill="#a78bfa" stroke="#0f172a" stroke-width="0.3"/>
    <line x1="8" y1="1" x2="16" y2="1" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="-6" y="6" width="14" height="2" rx="0.5" fill="#7c3aed" stroke="#0f172a" stroke-width="0.3"/>
  </g>
</svg>
