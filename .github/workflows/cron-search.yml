# Daily LegiScan full-text search sweep — the recall-first discovery loop.
# Once a day: bills rarely change intra-day and LegiScan's free key allows only
# 30,000 queries/month (overage SUSPENDS the account, and extra keys are
# forbidden). At 16 standing queries + up to 300 getBill per run, an every-2h
# cadence (12x/day) blew the monthly budget; daily keeps the worst case ~10x
# under it while still surfacing new bills within a day. The endpoint skips
# itself if a pipeline run is already in progress, so overlap can't pile up.
# Requires repo secrets API_BASE_URL and ADMIN_TOKEN.
name: Search sweep

on:
  schedule:
    # 06:15 UTC — well clear of the 10:00 UTC daily pipeline.
    - cron: "15 6 * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Hit /admin/cron-search
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${API_BASE_URL:-}" ] || [ -z "${ADMIN_TOKEN:-}" ]; then
            echo "Missing API_BASE_URL or ADMIN_TOKEN repo secret" >&2
            exit 1
          fi
          curl -sS --fail-with-body --max-time 30 \
            "${API_BASE_URL%/}/admin/cron-search?token=${ADMIN_TOKEN}"
